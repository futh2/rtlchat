<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTLChat — مساحة العمل</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <main class="workspace">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon48.png" alt="" aria-hidden="true">
        <div>
          <h1>مساحة العمل</h1>
          <p>تنسيق النصوص العربية محليًا</p>
        </div>
      </div>
      <button id="clearBtn" class="icon-btn" type="button" title="مسح النص والنتيجة" aria-label="مسح النص والنتيجة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M8 6V4h8v2"/>
          <path d="m19 6-1 14H6L5 6"/>
        </svg>
      </button>
    </header>

    <section class="modebar" aria-label="وضع الاتجاه">
      <button class="mode active" data-mode="smart">ذكي</button>
      <button class="mode" data-mode="rtl">RTL</button>
      <button class="mode" data-mode="ltr">LTR</button>
    </section>

    <section class="panel">
      <div class="panel-head">
        <strong>النص الأصلي</strong>
        <button id="pasteBtn" class="mini-btn">لصق</button>
      </div>
      <textarea id="input" placeholder="الصق النص هنا..."></textarea>
      <div class="panel-foot">
        <span id="count">0 حرف</span>
      </div>
    </section>

    <section class="panel output-panel">
      <div class="panel-head">
        <strong>النتيجة</strong>
        <div class="actions">
          <button id="copyText" class="mini-btn primary" disabled>نسخ</button>
          <button id="copyHtml" class="mini-btn" disabled>HTML</button>
        </div>
      </div>
      <div id="output" class="output" aria-live="polite"></div>
      <div class="panel-foot">
        <span id="status">بانتظار النص...</span>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
